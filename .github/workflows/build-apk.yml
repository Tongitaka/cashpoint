name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Create Complete Android Project
        run: |
          rm -rf android Android
          npm install @capacitor/android cordova-plugin-sms-receive
          npx cap add android
          npx cap sync android

      - name: Generate Icon and Splash Screen
        run: |
          mkdir -p assets
          mv icon.png assets/ 2>/dev/null || true
          mv splash.png assets/ 2>/dev/null || true
          npm install @capacitor/assets -D
          npx @capacitor/assets generate --android

      - name: Add Permissions (SMS & Call)
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CALL_PHONE" />\n    <uses-permission android:name="android.permission.RECEIVE_SMS" />\n    <uses-permission android:name="android.permission.READ_SMS" />' android/app/src/main/AndroidManifest.xml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cashpoint-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
